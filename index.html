<!doctype html>
<html lang="fa" dir="rtl" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaAi | دستیار هوش مصنوعی</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body class="dark:bg-dark-bg bg-light-bg px-5 py-6">
    <div class="w-full h-full flex gap-2">
      <div
        class="font-vazir w-[20%] h-full dark:bg-dark-sidebar bg-light-sidebar rounded-3xl shadow-md px-6 py-5"
      >
        <!-- sidebar header -->
        <div class="flex gap-5 items-center justify-between">
          <img
            src="./src/assets/images/sidebar-logo.png"
            class="size-15"
            alt="Logo"
          />
          <div class="w-full">
            <h1
              class="font-bold text-lg dark:text-dark-text-primary text-light-text-primary"
            >
              Nexa AI
            </h1>
            <p
              class="dark:text-dark-text-secondary text-light-text-secondary text-sm font-medium"
            >
              دستیار هوش مصنوعی
            </p>
          </div>
        </div>
        <!-- new chat btn -->
        <button
          class="mt-5 text-white font-bold w-full py-3.5 rounded-2xl bg-linear-90 from-gradient-first to-gradient-second cursor-pointer transition-transform duration-300 hover:-translate-y-0.5"
        >
          <i class="fa-solid fa-plus"></i>
          گفتوگو جدید
        </button>
        <!-- menu -->
        <div class="mt-5 mb-2">
          <ul class="flex flex-col gap-1">
            <li
              class="flex gap-3 items-center w-full py-4 rounded-2xl pr-5 font-bold dark:text-dark-text-primary text-light-text-primary active dark:hover:bg-dark-hover hover:bg-light-hover dark:hover:text-dark-primary-hover hover:text-light-primary-hover transition-colors duration-300i cursor-pointer"
            >
              <i class="fa-regular fa-message"></i>
              پیام ها
            </li>
            <li
              class="flex gap-3 items-center w-full py-4 rounded-2xl pr-5 font-bold dark:text-dark-text-primary text-light-text-primary dark:hover:bg-dark-hover hover:bg-light-hover dark:hover:text-dark-primary-hover hover:text-light-primary-hover transition-colors duration-300i cursor-pointer"
            >
              <i class="fa-solid fa-gear"></i>
              تنظیمات
            </li>
          </ul>
        </div>
        <!-- DIVIDER -->
        <div
          class="w-full h-0.5 dark:border-dark-divider bg-light-divider"
        ></div>
        <!-- recent chants-->
        <div class="mt-2 w-full py-3">
          <div class="flex items-center justify-between px-3 dark:text-dark-text-secondary text-light-text-secondary">
            <h2 class="font-bold  text-[16px]">تاریخچه گفتگوها</h2>
            <button class="cursor-pointer">
              <i class="fa-solid fa-magnifying-glass text-[18px]"></i>
            </button>
          </div>
          <div class="mt-4 flex gap-2 flex-col h-85 overflow-y-auto recent-chats-data">
            <div class="flex justify-between items-center rounded-2xl py-4 px-3  active-chat">
              <p class="font-medium line-clamp-1 w-45 dark:text-dark-text-secondary text-light-text-secondary chat-summary">سلام جطوری میتونم اینکار رو بکنم که برم به اونجا</p>
              <p class="[direction:ltr] text-xs dark:text-dark-text-secondary text-light-text-secondary chat-created-time">10:20 AM</p>
            </div>

            <div class="flex justify-between items-center rounded-2xl py-4 px-3">
              <p class="font-medium dark:text-dark-text-secondary text-light-text-secondary">پروژه چت بات</p>
              <p class="[direction:ltr] dark:text-dark-text-secondary text-light-text-secondary text-xs">10:20 AM</p>
            </div>

          </div>
        </div>
        <!-- user data -->
         <div class="flex gap-4 mt-7 rounded-2xl border-2 dark:border-dark-border border-light-border dark:bg-dark-bg px-3 py-3 bg-light-bg">
            <img src="./src/assets/images/sidebar-logo.png" class="size-13 rounded-full" alt="">
            <div>
                <p class="font-bold dark:text-dark-text-primary text-light-text-primary">پرهام سراوانی</p>
                <p class="dark:text-dark-text-secondary text-light-text-secondary">برنامه نویس فرانت اند</p>
            </div>
         </div>
        <!-- dark mode -->
        <div
          class="flex mt-7 justify-between items-center px-6 py-6 dark:bg-dark-bg bg-light-bg rounded-2xl [direction:ltr]"
        >
          <div
            class="relative dark:text-dark-text-primary text-light-text-primary flex gap-2"
          >
            <i class="fa-solid fa-moon text-2xl -top-0.5 absolute"></i>
            <p class="font-vazir font-medium ml-8">Dark Mode</p>
          </div>
          <label
            for="input"
            class="cursor-pointer rounded-full dark:bg-dark-card bg-light-card"
          >
            <input id="input" type="checkbox" hidden />
            <div
              class="relative w-13 h-7 rounded-full before:absolute before:h-5.5 before:w-5.5 before:rounded-full before:top-0 before:bottom-0 before:my-auto before:translate-x-1 dark:before:bg-white before:bg-light-primary theme-toggle-circle"
            ></div>
          </label>
        </div>
      </div>

      <div
        class="w-[80%] h-full dark:bg-dark-card bg-light-card rounded-3xl shadow-md"
      ></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
